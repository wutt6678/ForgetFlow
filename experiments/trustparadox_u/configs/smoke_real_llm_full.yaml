run:
  name: smoke_real_llm_full
  seed: 42
  repetitions: 1
  mode: experiment
  require_clean_tree: true

models:
  chat_provider: litellm
  chat_model: openai/qwen-plus
  chat_temperature: 0.0
  chat_max_tokens: 256

  embedding_provider: litellm
  embedding_model: openai/text-embedding-v3
  embedding_dimension: 1024

  api_base: https://llm-jhxtd03gjg0gd2o2.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
  api_key_env: OPENAI_API_KEY

firewall:
  enabled: true
  detector:
    exact_enabled: true
    entity_enabled: true
    semantic_enabled: true
    semantic_threshold: 0.80
  history:
    enabled: true
    window_size: 5
    reconstruction_threshold: 0.60
  policy:
    rich_actions_enabled: true
    privacy_utility_weight: 1.0
    trust_independent: true
  monitoring:
    continuous: true
    duration_rounds: 5
