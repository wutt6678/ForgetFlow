run:
  name: smoke_real_llm_full
  seed: 42
  repetitions: 1
  mode: experiment
  require_clean_tree: true

models:
  chat_provider: litellm
  chat_model: gpt-4.1-mini
  chat_temperature: 0.0
  chat_max_tokens: 256

  embedding_provider: litellm
  embedding_model: text-embedding-3-small
  embedding_dimension: 1536

  api_key_env: OPENAI_API_KEY

firewall:
  enabled: true
  detector:
    exact_enabled: true
    entity_enabled: true
    semantic_enabled: true
    semantic_threshold: 0.80
  history:
    enabled: true
    window_size: 5
    reconstruction_threshold: 0.60
  policy:
    rich_actions_enabled: true
    privacy_utility_weight: 1.0
    trust_independent: true
  monitoring:
    continuous: true
    duration_rounds: 5
