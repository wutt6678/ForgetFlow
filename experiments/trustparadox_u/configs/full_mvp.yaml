run:
  name: full_mvp
  seed: 42
  repetitions: 5
  mode: experiment

models:
  embedding_provider: litellm
  embedding_model: text-embedding-3-small
  embedding_dimension: 1536

firewall:
  enabled: true
  detector:
    exact_enabled: true
    entity_enabled: true
    semantic_enabled: true
    semantic_threshold: 0.80
  history:
    enabled: true
    window_size: 5
    reconstruction_threshold: 0.60
  policy:
    rich_actions_enabled: true
    privacy_utility_weight: 1.0
    trust_independent: true
  monitoring:
    continuous: true
    duration_rounds: 5
